<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 背景 - 天空和草地 -->
  <rect x="0" y="0" width="400" height="300" fill="#87CEEB"/>
  <rect x="0" y="300" width="400" height="200" fill="#5D9B3A"/>
  
  <!-- 云朵装饰 -->
  <g id="clouds">
    <rect x="50" y="60" width="60" height="30" fill="#FFFFFF"/>
    <rect x="40" y="70" width="80" height="20" fill="#FFFFFF"/>
    <rect x="280" y="80" width="70" height="25" fill="#FFFFFF"/>
    <rect x="270" y="90" width="90" height="15" fill="#FFFFFF"/>
  </g>
  
  <!-- 主登录面板 - MC 风格像素边框 -->
  <g id="login-panel">
    <!-- 面板阴影 -->
    <rect x="92" y="122" width="216" height="256" fill="#000000" opacity="0.3"/>
    
    <!-- 面板主体 - 深色背景 -->
    <rect x="90" y="120" width="220" height="260" fill="#C6C6C6"/>
    
    <!-- 内边框 - 浅色 -->
    <rect x="95" y="125" width="210" height="250" fill="#8B8B8B"/>
    
    <!-- 内容背景 -->
    <rect x="100" y="130" width="200" height="240" fill="#000001"/>
    
    <!-- 标题栏 -->
    <rect x="105" y="135" width="190" height="40" fill="#4A4A4A"/>
    
    <!-- 标题文字 -->
    <text x="200" y="162" font-family="monospace" font-size="14" fill="#FFFF00" text-anchor="middle" style="font-weight: bold;">SK8 GOAL</text>
    
    <!-- 像素风格图标 - 滑板 -->
    <g id="skateboard" transform="translate(170, 170)">
      <rect x="0" y="0" width="60" height="8" fill="#8B4513"/>
      <rect x="5" y="-5" width="10" height="6" fill="#AAAAAA"/>
      <rect x="40" y="-5" width="10" height="6" fill="#AAAAAA"/>
    </g>
    
    <!-- 用户名输入框标签 -->
    <text x="115" y="210" font-family="monospace" font-size="8" fill="#AAAAAA">用户名</text>
    
    <!-- 用户名输入框 - MC 风格凹陷效果 -->
    <rect x="110" y="215" width="180" height="30" fill="#000000"/>
    <rect x="111" y="216" width="178" height="28" fill="#2D2D2D"/>
    <rect x="112" y="217" width="176" height="26" fill="#1A1A1A"/>
    
    <!-- 输入框内文字提示 -->
    <text x="115" y="233" font-family="monospace" font-size="7" fill="#555555">输入用户名...</text>
    
    <!-- 密码输入框标签 -->
    <text x="115" y="265" font-family="monospace" font-size="8" fill="#AAAAAA">密  码</text>
    
    <!-- 密码输入框 -->
    <rect x="110" y="270" width="180" height="30" fill="#000000"/>
    <rect x="111" y="271" width="178" height="28" fill="#2D2D2D"/>
    <rect x="112" y="272" width="176" height="26" fill="#1A1A1A"/>
    
    <!-- 密码框提示 -->
    <text x="115" y="288" font-family="monospace" font-size="7" fill="#555555">******</text>
    
    <!-- 登录按钮 - MC 风格凸起效果 -->
    <g id="login-btn">
      <!-- 按钮阴影 -->
      <rect x="133" y="318" width="134" height="38" fill="#000000" opacity="0.3"/>
      
      <!-- 按钮主体 -->
      <rect x="130" y="315" width="140" height="40" fill="#5A5A5A"/>
      
      <!-- 按钮高光边 -->
      <rect x="130" y="315" width="140" height="2" fill="#8B8B8B"/>
      <rect x="130" y="315" width="2" height="40" fill="#8B8B8B"/>
      
      <!-- 按钮暗边 -->
      <rect x="130" y="353" width="140" height="2" fill="#2D2D2D"/>
      <rect x="268" y="315" width="2" height="40" fill="#2D2D2D"/>
      
      <!-- 按钮文字 -->
      <text x="200" y="338" font-family="monospace" font-size="10" fill="#FFFFFF" text-anchor="middle" style="font-weight: bold;">登 录</text>
    </g>
    
    <!-- 注册按钮 - 较小的按钮 -->
    <g id="register-btn">
      <rect x="150" y="365" width="100" height="25" fill="#4A4A4A"/>
      <text x="200" y="381" font-family="monospace" font-size="7" fill="#AAAAAA" text-anchor="middle">注册账号</text>
    </g>
  </g>
  
  <!-- 装饰性方块 - MC 风格 -->
  <g id="decorative-blocks">
    <!-- 左侧泥土块 -->
    <rect x="20" y="400" width="40" height="40" fill="#8B4513"/>
    <rect x="20" y="400" width="40" height="10" fill="#5D9B3A"/>
    <rect x="25" y="405" width="5" height="5" fill="#6B3E0A"/>
    <rect x="40" y="408" width="6" height="4" fill="#6B3E0A"/>
    
    <!-- 右侧石头块 -->
    <rect x="340" y="400" width="40" height="40" fill="#808080"/>
    <rect x="345" y="405" width="8" height="8" fill="#696969"/>
    <rect x="360" y="415" width="10" height="10" fill="#A9A9A9"/>
    <rect x="350" y="425" width="12" height="8" fill="#696969"/>
  </g>
  
  <!-- 底部装饰线 -->
  <rect x="0" y="480" width="400" height="20" fill="#3D3D3D"/>
  <text x="200" y="493" font-family="monospace" font-size="6" fill="#666666" text-anchor="middle">© 2024 SK8 GOAL</text>
</svg>
